name: Build

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-cmake:
    name: Build with CMake
    runs-on: ubuntu-latest
    container:
      image: chocotechnologies/dmod:1.0.2
    
    permissions:
      contents: read
    
    strategy:
      matrix:
        target: [STM32F407G, STM32F746xG, STM32F746ZG]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize and update submodules
      run: |
        git config --global --add safe.directory /__w/dmod-boot/dmod-boot
        git config --global --add safe.directory /__w/dmod-boot/dmod-boot/lib/dmod
        git config --global --add safe.directory /__w/dmod-boot/dmod-boot/lib/dmlog
        git submodule init
        git submodule update --recursive
    
    - name: Verify submodules
      run: |
        git submodule status
        ls -la lib/
        ls -la lib/dmod/
        ls -la lib/dmod/configs/arch/armv7/cortex-m4/
    
    - name: Verify toolchain installation
      run: |
        arm-none-eabi-gcc --version
        arm-none-eabi-objcopy --version
        arm-none-eabi-size --version
        cmake --version
    
    - name: Configure CMake for ${{ matrix.target }}
      run: |
        cmake -DCMAKE_BUILD_TYPE=Debug -DTARGET=${{ matrix.target }} -S . -B build
    
    - name: Build ${{ matrix.target }} with CMake
      run: |
        cmake --build build --config Debug
    
    - name: Check output files
      run: |
        ls -lh build/
        file build/dmboot.elf
        if [ -f build/dmboot.map ]; then file build/dmboot.map; fi
    
    - name: Display memory usage
      run: |
        arm-none-eabi-size build/dmboot.elf
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cmake-${{ matrix.target }}-firmware
        path: |
          build/dmboot.elf
          build/dmboot.map
        retention-days: 30

  build-all:
    name: All builds completed
    runs-on: ubuntu-latest
    needs: [build-cmake]
    
    permissions:
      contents: read
    
    steps:
    - name: All targets built successfully
      run: echo "All targets built successfully with CMake!"
